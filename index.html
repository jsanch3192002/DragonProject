<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Cinematic Dragon</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #00ff00;
      touch-action: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; }
    #status {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,.62);
      color: white;
      font-size: 14px;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
    #status.ok { color: #b6ffbf; }
    #status.error { color: #ffb7b7; }
  </style>
</head>
<body>
  <div id="status">Loading dragon…</div>
  <script type="module" src="./main.js"></script>
</body>
</html>
